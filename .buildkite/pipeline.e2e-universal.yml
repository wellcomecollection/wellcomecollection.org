steps:
  - label: "build e2e test image"
    command: ./playwright/get_playwright_image.sh
    retry:
      automatic:
        - exit_status: 143  # SIGTERM
          limit: 2
    plugins:
      - wellcomecollection/aws-assume-role#v0.2.2:
          role: "arn:aws:iam::130871440101:role/experience-ci"
      - ecr#v2.1.1:
          login: true

  - wait

  - label: "Check URLs"
    retry:
      automatic:
        - exit_status: 255  # docker-compose plugin exits with 255 on infrastructure interrupts
          limit: 2
        - exit_status: 143  # SIGTERM
          limit: 2
    plugins:
      - wellcomecollection/aws-assume-role#v0.2.2:
          role: "arn:aws:iam::130871440101:role/experience-ci"
      - ecr#v2.1.1:
          login: true
      - docker-compose#v3.5.0:
          run: e2e
          env:
            - BASE_URL=$PLAYWRIGHT_BASE_URL
          volumes:
            - "./.buildkite/urls:/usr/src/app/webapp/playwright/urls"
          command: ["bash", "check_urls.sh"]

  - label: "e2e test:desktop [$DEPLOYMENT_ENVIRONMENT]"
    retry:
      automatic:
        - exit_status: 255  # docker-compose plugin exits with 255 on infrastructure interrupts
          limit: 2
        - exit_status: 143  # SIGTERM
          limit: 2
    plugins:
      - wellcomecollection/aws-assume-role#v0.2.2:
          role: "arn:aws:iam::130871440101:role/experience-ci"
      - ecr#v2.1.1:
          login: true
      - docker-compose#v3.5.0:
          run: e2e
          env:
            - CI=true
            - PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL
            - USE_STAGE_APIS=$USE_STAGE_APIS
          command: ["yarn", "test"]
    agents:
      queue: scala # High parallelism for expensive tests

  - label: "e2e test:mobile [$DEPLOYMENT_ENVIRONMENT]"
    retry:
      automatic:
        - exit_status: 255  # docker-compose plugin exits with 255 on infrastructure interrupts
          limit: 2
        - exit_status: 143  # SIGTERM
          limit: 2
    plugins:
      - wellcomecollection/aws-assume-role#v0.2.2:
          role: "arn:aws:iam::130871440101:role/experience-ci"
      - ecr#v2.1.1:
          login: true
      - docker-compose#v3.5.0:
          run: e2e
          env:
            - CI=true
            - PLAYWRIGHT_BASE_URL=$PLAYWRIGHT_BASE_URL
            - USE_STAGE_APIS=$USE_STAGE_APIS
          command: ["yarn", "test:mobile"]
    agents:
      queue: scala # High parallelism for expensive tests
